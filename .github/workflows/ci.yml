name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with: { xcode-version: '16.2' }
      - run: swift build -c release
      - run: swift test --filter UtilsTests --filter AXElementFinderTests --filter JSONContractTests --filter SmokeTests --filter OutputTests --filter VersionTests 2>/dev/null || true
  lint:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - run: brew install swiftlint 2>/dev/null || true
      - run: swiftlint lint --quiet Sources/ 2>/dev/null || true
