# skylight-cli — ACT-Layer der Stealth-Triade
# Teil des Multi-Repo-Workspace. /doctor auditiert alle.

role: act-layer
triad: [playstealth-cli, skylight-cli, unmask-cli]
orchestrator: stealth-runner

repos:
  - name: stealth-runner
    url: https://github.com/OpenSIN-AI/stealth-runner
    role: orchestrator
  - name: skylight-cli
    url: https://github.com/SIN-CLIs/skylight-cli
    role: act-layer
    description: Screenshots + AXPress-Klicks via Accessibility API
  - name: unmask-cli
    url: https://github.com/SIN-CLIs/unmask-cli
    role: sense-layer
  - name: playstealth-cli
    url: https://github.com/SIN-CLIs/playstealth-cli
    role: hide-layer
  - name: heypiggy-worker
    url: https://github.com/OpenSIN-AI/A2A-SIN-Worker-heypiggy
    role: archive

click_mechanism: AXPress (AXUIElementPerformAction + kAXPressAction)
chrome_accessibility: VoiceOver-trick
forbidden: [CGEventPostToPid, cua-driver, --force-renderer-accessibility, CDP, DOM]
